<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vessence — Log In</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0e17;
            color: #e0def4;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #1a1826;
            border: 1px solid #2a2740;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #c4b5fd, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo p {
            color: #6e6a86;
            font-size: 14px;
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #908caa;
            margin-bottom: 6px;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            background: #13111d;
            border: 1px solid #2a2740;
            border-radius: 8px;
            color: #e0def4;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: #7c3aed; }
        input::placeholder { color: #44415a; }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            color: #fff;
        }

        .btn-primary:hover:not(:disabled) { opacity: 0.9; }

        .btn-google {
            background: #1f1d2e;
            color: #e0def4;
            border: 1px solid #2a2740;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-google:hover:not(:disabled) { border-color: #44415a; }

        .btn-outline {
            background: transparent;
            color: #c4b5fd;
            border: 1px solid #2a2740;
            margin-top: 12px;
        }

        .btn-outline:hover:not(:disabled) { border-color: #7c3aed; }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: #44415a;
            font-size: 13px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #2a2740;
        }

        .divider span { padding: 0 12px; }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        /* Dashboard */
        .dashboard {
            display: none;
        }

        .dashboard h2 {
            font-size: 20px;
            margin-bottom: 8px;
        }

        .dashboard .greeting {
            color: #908caa;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #2a2740;
            font-size: 14px;
        }

        .info-row:last-child { border-bottom: none; }

        .info-label { color: #6e6a86; }
        .info-value { color: #e0def4; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; }

        .token-section {
            background: #13111d;
            border: 1px solid #2a2740;
            border-radius: 8px;
            padding: 16px;
            margin: 20px 0;
        }

        .token-section h3 {
            font-size: 14px;
            color: #908caa;
            margin-bottom: 10px;
        }

        .token-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .token-value {
            flex: 1;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 12px;
            color: #c4b5fd;
            word-break: break-all;
            line-height: 1.5;
        }

        .small-btn {
            background: #2a2740;
            border: none;
            color: #908caa;
            border-radius: 4px;
            padding: 6px 10px;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
        }

        .small-btn:hover { color: #e0def4; }

        .env-hint {
            background: rgba(124, 58, 237, 0.1);
            border: 1px solid rgba(124, 58, 237, 0.2);
            border-radius: 8px;
            padding: 12px;
            font-size: 13px;
            color: #c4b5fd;
            margin-top: 12px;
        }

        .env-hint code {
            background: #13111d;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 12px;
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: #6e6a86;
        }

        .footer a {
            color: #c4b5fd;
            text-decoration: none;
        }

        .footer a:hover { text-decoration: underline; }

        .google-icon { width: 18px; height: 18px; }

        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-online {
            background: rgba(163, 230, 53, 0.15);
            color: #a3e635;
        }

        .status-offline {
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
        }

        .status-subscribed {
            background: rgba(124, 58, 237, 0.15);
            color: #c4b5fd;
        }

        .btn-subscribe {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: #fff;
            margin-top: 8px;
        }

        .btn-subscribe:hover:not(:disabled) { opacity: 0.9; }

        .subscription-active {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #a3e635;
            font-size: 14px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- Login form -->
        <div id="loginForm">
            <div class="logo">
                <h1>Vessence</h1>
                <p>Log in to your account</p>
            </div>

            <div id="error" class="error"></div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Your password" autocomplete="current-password">
            </div>

            <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">Log in</button>

            <div class="divider"><span>or</span></div>

            <button class="btn btn-google" onclick="doGoogleSignIn()">
                <svg class="google-icon" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Log in with Google
            </button>

            <div class="footer">
                Don't have an account? <a href="/register">Sign up</a>
            </div>
        </div>

        <!-- Dashboard (shown after login) -->
        <div id="dashboard" class="dashboard">
            <div class="logo">
                <h1>Vessence</h1>
            </div>

            <h2>Welcome back, <span id="userName"></span></h2>
            <p class="greeting">Manage your relay connection and account.</p>

            <div class="info-row">
                <span class="info-label">User ID</span>
                <span class="info-value" id="userId"></span>
            </div>

            <div class="info-row">
                <span class="info-label">Tunnel status</span>
                <span id="tunnelStatus">
                    <span class="status-badge status-offline">Checking...</span>
                </span>
            </div>

            <div class="token-section">
                <h3>Relay Token</h3>
                <div class="token-row">
                    <span class="token-value" id="relayToken"></span>
                    <button class="small-btn" onclick="copyToken()">Copy</button>
                </div>

                <div class="env-hint">
                    Add to your <code>.env</code> file:<br>
                    <code>RELAY_TOKEN=<span id="tokenInline"></span></code>
                </div>
            </div>

            <button class="btn btn-outline" onclick="regenerateToken()">Regenerate relay token</button>

            <!-- Relay Subscription Section -->
            <div class="token-section" id="relaySubscription" style="margin-top: 20px;">
                <h3>Relay Subscription</h3>
                <div id="subscriptionContent">
                    <p style="color: #908caa; font-size: 13px; margin-bottom: 12px;">Checking subscription status...</p>
                </div>
            </div>

            <div class="footer">
                <a href="#" onclick="doLogout(); return false;">Log out</a>
            </div>
        </div>
    </div>

    <script>
        let sessionToken = localStorage.getItem('vessence_session');
        let currentUserId = localStorage.getItem('vessence_user_id');

        // If already logged in, try to load dashboard
        if (sessionToken) {
            loadDashboard();
        }

        document.querySelectorAll('#loginForm input').forEach(input => {
            input.addEventListener('keydown', e => {
                if (e.key === 'Enter') doLogin();
            });
        });

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function hideError() {
            document.getElementById('error').style.display = 'none';
        }

        async function doLogin() {
            hideError();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showError('Email and password are required.');
                return;
            }

            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = 'Logging in...';

            try {
                const res = await fetch('/api/accounts/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                });

                const data = await res.json();

                if (!res.ok) {
                    showError(data.error || 'Login failed.');
                    btn.disabled = false;
                    btn.textContent = 'Log in';
                    return;
                }

                // Save session
                sessionToken = data.session_token;
                currentUserId = data.user_id;
                localStorage.setItem('vessence_session', sessionToken);
                localStorage.setItem('vessence_user_id', currentUserId);

                showDashboard(data);
            } catch (err) {
                showError('Network error. Please try again.');
                btn.disabled = false;
                btn.textContent = 'Log in';
            }
        }

        async function loadDashboard() {
            try {
                const res = await fetch('/api/accounts/me', {
                    headers: { 'Authorization': 'Bearer ' + sessionToken },
                });

                if (!res.ok) {
                    // Session expired
                    localStorage.removeItem('vessence_session');
                    localStorage.removeItem('vessence_user_id');
                    sessionToken = null;
                    return;
                }

                const data = await res.json();
                showDashboard(data);
            } catch (err) {
                // Network error, show login
            }
        }

        function showDashboard(data) {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('userName').textContent = data.display_name;
            document.getElementById('userId').textContent = data.user_id.substring(0, 8) + '...';
            document.getElementById('relayToken').textContent = data.relay_token;
            document.getElementById('tokenInline').textContent = data.relay_token;

            // Check tunnel status and subscription
            checkTunnelStatus(data.user_id);
            checkSubscription();
        }

        async function checkTunnelStatus(userId) {
            try {
                const res = await fetch('/api/relay/user/' + userId + '/status');
                const data = await res.json();
                const el = document.getElementById('tunnelStatus');
                if (data.online) {
                    el.innerHTML = '<span class="status-badge status-online">Online</span>';
                } else {
                    el.innerHTML = '<span class="status-badge status-offline">Offline</span>';
                }
            } catch (err) {
                // ignore
            }
        }

        function copyToken() {
            const token = document.getElementById('relayToken').textContent;
            navigator.clipboard.writeText(token).then(() => {
                const btns = document.querySelectorAll('.small-btn');
                btns[0].textContent = 'Copied!';
                setTimeout(() => btns[0].textContent = 'Copy', 2000);
            });
        }

        async function regenerateToken() {
            if (!confirm('This will invalidate your current relay token. Your Vessence tunnel will disconnect until you update your .env file. Continue?')) {
                return;
            }

            try {
                const res = await fetch('/api/accounts/relay-token/regenerate', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + sessionToken },
                });

                if (!res.ok) {
                    alert('Failed to regenerate token. Please log in again.');
                    return;
                }

                const data = await res.json();
                document.getElementById('relayToken').textContent = data.relay_token;
                document.getElementById('tokenInline').textContent = data.relay_token;
            } catch (err) {
                alert('Network error.');
            }
        }

        function doLogout() {
            localStorage.removeItem('vessence_session');
            localStorage.removeItem('vessence_user_id');
            sessionToken = null;
            currentUserId = null;
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
        }

        function doGoogleSignIn() {
            showError('Google sign-in requires the server to be configured with a Google Client ID. Contact your administrator.');
        }

        async function checkSubscription() {
            const content = document.getElementById('subscriptionContent');
            try {
                const res = await fetch('/api/relay/subscription-status', {
                    headers: { 'Authorization': 'Bearer ' + sessionToken },
                });

                if (!res.ok) {
                    content.innerHTML = '<p style="color: #908caa; font-size: 13px;">Unable to check subscription status.</p>';
                    return;
                }

                const data = await res.json();
                if (data.subscribed) {
                    content.innerHTML = `
                        <div class="subscription-active">
                            <span class="status-badge status-subscribed">Relay active &#10003;</span>
                            Remote access is enabled.
                        </div>
                    `;
                } else {
                    content.innerHTML = `
                        <p style="color: #908caa; font-size: 13px; margin-bottom: 12px;">
                            Enable remote access to your Vessence from anywhere for <strong style="color: #c4b5fd;">$5/month</strong>.
                        </p>
                        <button class="btn btn-subscribe" onclick="subscribeRelay()">Enable remote access for $5/month</button>
                    `;
                }
            } catch (err) {
                content.innerHTML = '<p style="color: #908caa; font-size: 13px;">Unable to check subscription status.</p>';
            }
        }

        async function subscribeRelay() {
            try {
                const res = await fetch('/api/relay/subscribe', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + sessionToken },
                });

                if (!res.ok) {
                    const data = await res.json();
                    alert(data.error || 'Failed to start checkout.');
                    return;
                }

                const data = await res.json();
                if (data.checkout_url) {
                    window.location.href = data.checkout_url;
                } else {
                    alert('Failed to create checkout session.');
                }
            } catch (err) {
                alert('Network error. Please try again.');
            }
        }
    </script>
</body>
</html>
