<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vessence — Create Account</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0e17;
            color: #e0def4;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #1a1826;
            border: 1px solid #2a2740;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #c4b5fd, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo p {
            color: #6e6a86;
            font-size: 14px;
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #908caa;
            margin-bottom: 6px;
        }

        input[type="email"],
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            background: #13111d;
            border: 1px solid #2a2740;
            border-radius: 8px;
            color: #e0def4;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #7c3aed;
        }

        input::placeholder {
            color: #44415a;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            color: #fff;
        }

        .btn-primary:hover:not(:disabled) { opacity: 0.9; }

        .btn-google {
            background: #1f1d2e;
            color: #e0def4;
            border: 1px solid #2a2740;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-google:hover:not(:disabled) { border-color: #44415a; }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: #44415a;
            font-size: 13px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #2a2740;
        }

        .divider span { padding: 0 12px; }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .success-panel {
            display: none;
        }

        .success-panel h2 {
            color: #a3e635;
            font-size: 20px;
            margin-bottom: 16px;
        }

        .token-box {
            background: #13111d;
            border: 1px solid #2a2740;
            border-radius: 8px;
            padding: 14px;
            margin: 16px 0;
            position: relative;
        }

        .token-box code {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 13px;
            word-break: break-all;
            color: #c4b5fd;
            display: block;
            padding-right: 40px;
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #2a2740;
            border: none;
            color: #908caa;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
        }

        .copy-btn:hover { color: #e0def4; }

        .instructions {
            background: rgba(124, 58, 237, 0.1);
            border: 1px solid rgba(124, 58, 237, 0.2);
            border-radius: 8px;
            padding: 14px;
            font-size: 13px;
            color: #c4b5fd;
            line-height: 1.6;
        }

        .instructions code {
            background: #13111d;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 12px;
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: #6e6a86;
        }

        .footer a {
            color: #c4b5fd;
            text-decoration: none;
        }

        .footer a:hover { text-decoration: underline; }

        .google-icon {
            width: 18px;
            height: 18px;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- Registration form -->
        <div id="registerForm">
            <div class="logo">
                <h1>Vessence</h1>
                <p>Create your account</p>
            </div>

            <div id="error" class="error"></div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
            </div>

            <div class="form-group">
                <label for="displayName">Display name</label>
                <input type="text" id="displayName" placeholder="How others see you" autocomplete="name">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password">
            </div>

            <button class="btn btn-primary" id="signupBtn" onclick="doRegister()">Create account</button>

            <div class="divider"><span>or</span></div>

            <button class="btn btn-google" id="googleBtn" onclick="doGoogleSignIn()">
                <svg class="google-icon" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Sign up with Google
            </button>

            <div class="footer">
                Already have an account? <a href="/login">Log in</a>
            </div>
        </div>

        <!-- Success panel (shown after registration) -->
        <div id="successPanel" class="success-panel">
            <div class="logo">
                <h1>Vessence</h1>
            </div>

            <h2>Account created</h2>

            <p style="font-size: 14px; color: #908caa; margin-bottom: 16px;">
                Your relay token connects your local Vessence instance to the cloud relay.
            </p>

            <div class="token-box">
                <code id="tokenDisplay"></code>
                <button class="copy-btn" onclick="copyToken()">Copy</button>
            </div>

            <div class="instructions">
                Add this to your Vessence <code>.env</code> file:<br>
                <code>RELAY_TOKEN=<span id="tokenInline"></span></code>
            </div>

            <div class="footer" style="margin-top: 24px;">
                <a href="/login">Go to login</a>
            </div>
        </div>
    </div>

    <script>
        // Enter key submits the form
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('keydown', e => {
                if (e.key === 'Enter') doRegister();
            });
        });

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function hideError() {
            document.getElementById('error').style.display = 'none';
        }

        async function doRegister() {
            hideError();
            const email = document.getElementById('email').value.trim();
            const displayName = document.getElementById('displayName').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !displayName || !password) {
                showError('All fields are required.');
                return;
            }
            if (password.length < 8) {
                showError('Password must be at least 8 characters.');
                return;
            }

            const btn = document.getElementById('signupBtn');
            btn.disabled = true;
            btn.textContent = 'Creating account...';

            try {
                const res = await fetch('/api/accounts/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, display_name: displayName, password }),
                });

                const data = await res.json();

                if (!res.ok) {
                    showError(data.error || 'Registration failed.');
                    btn.disabled = false;
                    btn.textContent = 'Create account';
                    return;
                }

                // Show success
                document.getElementById('registerForm').style.display = 'none';
                document.getElementById('successPanel').style.display = 'block';
                document.getElementById('tokenDisplay').textContent = data.relay_token;
                document.getElementById('tokenInline').textContent = data.relay_token;
            } catch (err) {
                showError('Network error. Please try again.');
                btn.disabled = false;
                btn.textContent = 'Create account';
            }
        }

        function copyToken() {
            const token = document.getElementById('tokenDisplay').textContent;
            navigator.clipboard.writeText(token).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = 'Copied!';
                setTimeout(() => btn.textContent = 'Copy', 2000);
            });
        }

        function doGoogleSignIn() {
            showError('Google sign-in requires the server to be configured with a Google Client ID. Contact your administrator.');
        }
    </script>
</body>
</html>
