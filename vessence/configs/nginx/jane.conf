# nginx configuration for Jane Web (if nginx is installed)
#
# This config is provided as a reference in case nginx is installed in the
# future. Currently the system uses the Python reverse proxy instead.
#
# To use:
#   sudo cp configs/nginx/jane.conf /etc/nginx/sites-available/jane
#   sudo ln -s /etc/nginx/sites-available/jane /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo nginx -s reload

upstream jane_backend {
    server 127.0.0.1:8081;
    # During deploy, sed will swap this to 8082 and back
}

server {
    listen 8080;
    server_name _;

    # Timeouts for long-running LLM requests
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_connect_timeout 10s;

    # Buffering off for streaming responses (SSE)
    proxy_buffering off;
    proxy_cache off;

    location / {
        proxy_pass http://jane_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding on;
    }

    # WebSocket support
    location /ws {
        proxy_pass http://jane_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # Health check passthrough
    location /health {
        proxy_pass http://jane_backend/health;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }
}
