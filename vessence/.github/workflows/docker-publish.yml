name: Build & Publish Docker Images

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: vessence

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: chromadb
            dockerfile: docker/chromadb/Dockerfile
            image: chromadb
          - service: amber
            dockerfile: docker/amber/Dockerfile
            image: amber
          - service: vault
            dockerfile: docker/vault/Dockerfile
            image: vault
          - service: jane
            dockerfile: docker/jane/Dockerfile
            image: jane
          - service: onboarding
            dockerfile: docker/onboarding/Dockerfile
            image: onboarding

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            # Tag with git tag (e.g. v1.2.3)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # Tag branch pushes as :latest on main
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag every commit sha for traceability
            type=sha,prefix=sha-,format=short

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache: reuse layers from the last successful build
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:buildcache,mode=max
          platforms: linux/amd64,linux/arm64

  # Lightweight smoke-test: spin up compose and hit health endpoints
  integration-test:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create minimal .env for smoke test
        run: |
          cat > .env << 'EOF'
          GOOGLE_API_KEY=AIzaSy_SMOKE_TEST_KEY_NOT_REAL
          USER_NAME=TestUser
          JANE_BRAIN=gemini
          SESSION_SECRET_KEY=smoke-test-secret
          CHROMADB_HOST=chromadb
          CHROMADB_PORT=8001
          ADK_SERVER_URL=http://amber:8000
          EOF

      - name: Pull latest images
        run: docker compose pull

      - name: Start services
        run: docker compose up -d --wait --wait-timeout 120
        continue-on-error: true

      - name: Health check — onboarding
        run: curl -sf http://localhost:3000/health || echo "onboarding health check failed (non-blocking)"

      - name: Show logs on failure
        if: failure()
        run: docker compose logs --tail=50

      - name: Tear down
        if: always()
        run: docker compose down -v
