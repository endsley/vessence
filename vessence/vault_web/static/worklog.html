<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Work Log</title>
  <meta name="theme-color" content="#0f172a"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    body { background: #0f172a; color: #e2e8f0; }
  </style>
</head>
<body class="min-h-screen" x-data="workLogApp()" x-init="loadActivities()">

<!-- Header -->
<header class="bg-slate-900 border-b border-slate-700 px-4 py-3 flex items-center gap-3 sticky top-0 z-40">
  <a href="/" class="flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 transition" title="Back to Jane">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    <span class="text-xs font-medium">Jane</span>
  </a>
  <span class="text-xl">📋</span>
  <h1 class="font-bold text-white text-lg">Work Log</h1>
  <div class="ml-auto text-slate-500 text-xs" x-text="activities.length + ' entries'"></div>
</header>

<!-- Activity Feed -->
<main class="max-w-2xl mx-auto p-4 space-y-3">
  <div x-show="loading" class="text-center py-16 text-slate-500">Loading...</div>

  <div x-show="!loading && activities.length === 0" class="text-center py-16 text-slate-500">
    <p class="text-5xl mb-4">📋</p>
    <p class="text-lg text-slate-300 mb-2">No activity yet</p>
    <p class="text-sm">Jane will log her work here as she completes tasks.</p>
  </div>

  <template x-for="(activity, i) in activities" :key="i">
    <div class="bg-slate-800 rounded-xl p-4 border border-slate-700">
      <div class="flex items-start gap-3">
        <div class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0 mt-0.5"
          :class="activity.category === 'chat' ? 'bg-violet-900 text-violet-300' :
                  activity.category === 'file' ? 'bg-blue-900 text-blue-300' :
                  activity.category === 'essence' ? 'bg-emerald-900 text-emerald-300' :
                  'bg-slate-700 text-slate-300'"
          x-text="activity.category === 'chat' ? '💬' :
                  activity.category === 'file' ? '📁' :
                  activity.category === 'essence' ? '✨' : '📋'">
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm text-slate-200" x-text="activity.description"></p>
          <p class="text-xs text-slate-500 mt-1" x-text="formatTime(activity.timestamp)"></p>
        </div>
      </div>
    </div>
  </template>
</main>

<script>
function workLogApp() {
  return {
    activities: [],
    loading: true,

    async loadActivities() {
      try {
        const r = await fetch('/api/essences/work_log/activities');
        if (r.ok) {
          const data = await r.json();
          this.activities = data.activities || [];
        }
      } catch (e) {
        console.error('Failed to load activities:', e);
      }
      this.loading = false;

      // Auto-refresh every 30 seconds
      setInterval(() => this.refreshActivities(), 30000);
    },

    async refreshActivities() {
      try {
        const r = await fetch('/api/essences/work_log/activities');
        if (r.ok) {
          const data = await r.json();
          this.activities = data.activities || [];
        }
      } catch (_) {}
    },

    formatTime(ts) {
      if (!ts) return '';
      const d = new Date(ts);
      const now = new Date();
      const diffMs = now - d;
      const diffMins = Math.floor(diffMs / 60000);
      if (diffMins < 1) return 'Just now';
      if (diffMins < 60) return diffMins + 'm ago';
      const diffHrs = Math.floor(diffMins / 60);
      if (diffHrs < 24) return diffHrs + 'h ago';
      return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
    },
  };
}
</script>
</body>
</html>
