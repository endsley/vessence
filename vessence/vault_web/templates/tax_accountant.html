<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tax Accountant 2025</title>
  <meta name="theme-color" content="#0f172a"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    :root { color-scheme: dark; --chat-font-size: 0.875rem; }
    html, body { height: 100%; overflow: hidden; }
    body { background: #0f172a; color: #e2e8f0; min-height: 100dvh; }
    .chat-content { font-size: var(--chat-font-size) !important; }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #475569; border-radius: 6px; }
    .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #64748b; }
    .chat-bubble-user { background: #4338ca; border-radius: 18px 18px 4px 18px; }
    .chat-bubble-bot  { background: #1e293b; border-radius: 18px 18px 18px 4px; border: 1px solid #334155; }
    details.code-collapse { margin: 0.5rem 0; }
    details.code-collapse summary {
      cursor: pointer; font-size: 0.75rem; color: #64748b;
      padding: 4px 8px; background: #0f172a; border: 1px solid #334155;
      border-radius: 6px; user-select: none; list-style: none;
    }
    details.code-collapse summary::-webkit-details-marker { display: none; }
    details.code-collapse summary::before { content: '\25B6 '; font-size: 0.6rem; }
    details.code-collapse[open] summary::before { content: '\25BC '; }
    details.code-collapse[open] summary { border-radius: 6px 6px 0 0; border-bottom: none; }
    details.code-collapse pre {
      margin: 0 !important; border-radius: 0 0 6px 6px !important;
      border: 1px solid #334155; border-top: none;
      background: #0f172a !important; padding: 0.75rem !important;
      overflow-x: auto; font-size: 0.8rem; line-height: 1.4;
    }
    details.code-collapse pre code { background: transparent !important; padding: 0 !important; }
    .drop-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(67, 56, 202, 0.15);
      border: 3px dashed #6366f1;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .composer-shell {
      padding-bottom: calc(0.75rem + env(safe-area-inset-bottom, 0px));
    }
  </style>
</head>
<body class="h-[100dvh] overflow-hidden flex flex-col" x-data="taxApp()" x-init="init()" x-cloak
  @dragover.prevent="dragOver = true"
  @dragleave.prevent="dragOver = false"
  @drop.prevent="handleDrop($event)">

  <!-- Drag overlay -->
  <div x-show="dragOver" x-cloak class="drop-overlay">
    <div class="bg-slate-900 border border-indigo-500 rounded-2xl px-8 py-6 text-center shadow-2xl pointer-events-none">
      <svg class="w-12 h-12 mx-auto text-indigo-400 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
      </svg>
      <p class="text-indigo-300 font-semibold">Drop W-2, 1099, receipts, or other tax documents</p>
      <p class="text-slate-500 text-sm mt-1">PDF, images, CSV supported</p>
    </div>
  </div>

  <!-- Header -->
  <header class="flex items-center gap-3 px-4 py-3 bg-slate-900 border-b border-slate-700 flex-shrink-0">
    <div class="w-9 h-9 rounded-full bg-indigo-700 flex items-center justify-center flex-shrink-0">
      <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
      </svg>
    </div>
    <div>
      <h1 class="text-white font-semibold leading-tight">Tax Accountant 2025</h1>
      <p class="text-slate-400 text-xs">Chat-based tax preparation assistant</p>
    </div>
    <!-- Essences dropdown -->
    <div class="relative" x-data="essenceDropdown()" @click.outside="open = false">
      <button @click="toggle()" class="flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg text-xs font-medium transition text-slate-400 hover:text-white hover:bg-slate-800 border border-slate-700/50">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
        </svg>
        <span>Essences</span>
        <svg class="w-3 h-3 transition-transform" :class="open ? 'rotate-180' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
      </button>
      <div x-show="open" x-cloak x-transition
        class="absolute left-0 top-full mt-1 w-56 rounded-xl border border-slate-700 bg-slate-900 shadow-2xl overflow-hidden z-50">
          <a href="/"
            class="flex items-center gap-2 px-3 py-2.5 text-xs text-slate-300 hover:text-white hover:bg-slate-800 transition">
            <span class="w-5 h-5 rounded bg-violet-700 flex items-center justify-center text-[10px] font-bold text-white flex-shrink-0">J</span>
            Jane
          </a>
          <template x-for="e in items" :key="e.name">
            <a :href="'/vault?tab=essences&open=' + encodeURIComponent(e.name)"
              class="flex items-center gap-2 px-3 py-2 text-xs text-slate-300 hover:text-white hover:bg-slate-800 transition border-t border-slate-700/50">
              <span class="w-5 h-5 rounded bg-violet-800 flex items-center justify-center text-[10px] flex-shrink-0"
                x-text="e.name.charAt(0).toUpperCase()"></span>
              <span class="truncate" x-text="e.name"></span>
              <span x-show="e.loaded" class="ml-auto w-1.5 h-1.5 rounded-full bg-green-500 flex-shrink-0"></span>
            </a>
          </template>
          <template x-if="items.length === 0">
            <p class="px-3 py-2 text-[10px] text-slate-500 italic border-t border-slate-700/50">No essences installed</p>
          </template>
          <a href="/essences"
            class="flex items-center gap-2 px-3 py-2.5 text-xs text-slate-500 hover:text-slate-300 transition border-t border-slate-700">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
            Manage essences
          </a>
      </div>
    </div>
    <!-- Tools dropdown -->
    <div class="relative" x-data="toolsDropdown()" @click.outside="open = false">
      <button @click="toggle()" class="flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg text-xs font-medium transition text-slate-400 hover:text-white hover:bg-slate-800 border border-slate-700/50">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        <span>Tools</span>
        <svg class="w-3 h-3 transition-transform" :class="open ? 'rotate-180' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
      </button>
      <div x-show="open" x-cloak x-transition
        class="absolute left-0 top-full mt-1 w-56 rounded-xl border border-slate-700 bg-slate-900 shadow-2xl overflow-hidden z-50">
          <template x-for="e in items" :key="e.name">
            <a :href="e.name === 'Music Playlist' ? '/vault?tab=music' : e.name === 'Work Log' ? '/worklog' : e.name === 'Daily Briefing' ? '/briefing' : '/vault'"
              class="flex items-center gap-2 px-3 py-2 text-xs text-slate-300 hover:text-white hover:bg-slate-800 transition">
              <span class="w-5 h-5 rounded bg-slate-700 flex items-center justify-center text-[10px] flex-shrink-0"
                x-text="e.name.charAt(0).toUpperCase()"></span>
              <span class="truncate" x-text="e.name"></span>
              <span x-show="e.loaded" class="ml-auto w-1.5 h-1.5 rounded-full bg-green-500 flex-shrink-0"></span>
            </a>
          </template>
          <template x-if="items.length === 0">
            <p class="px-3 py-2 text-[10px] text-slate-500 italic">No tools installed</p>
          </template>
      </div>
    </div>
    <div class="ml-auto flex items-center gap-2">
      <a href="/" class="text-slate-400 hover:text-white transition px-2.5 py-1.5 rounded-lg hover:bg-slate-800 text-xs font-medium" title="Back to Jane">
        <svg class="w-4 h-4 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
        </svg>
        Jane
      </a>
      <button @click="clearSession()" class="text-slate-400 hover:text-white transition px-2.5 py-1.5 rounded-lg hover:bg-slate-800 text-xs font-medium" title="New Session">
        New Session
      </button>
    </div>
  </header>

  <!-- Messages -->
  <div class="flex-1 min-h-0 overflow-y-auto scrollbar-thin p-4 pb-6 space-y-4" id="chat-messages" x-ref="chatMessages">
    <!-- Empty state -->
    <template x-if="messages.length === 0">
      <div class="max-w-lg mx-auto py-12 px-4 text-center">
        <div class="w-16 h-16 rounded-full bg-indigo-800 flex items-center justify-center text-2xl mx-auto mb-4">
          <svg class="w-8 h-8 text-indigo-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
          </svg>
        </div>
        <h2 class="text-xl font-semibold text-white mb-2">Tax Accountant 2025</h2>
        <p class="text-slate-400 text-sm leading-relaxed mb-6">
          I can help you prepare your taxes, analyze W-2s, review deductions, and answer tax questions.
          Upload documents or ask me anything about your tax situation.
        </p>
        <div class="flex flex-wrap gap-2 justify-center">
          <button @click="input = 'What documents do I need for my 2025 tax return?'; send()"
            class="px-4 py-2 text-xs rounded-lg border border-indigo-700/50 bg-indigo-900/20 text-indigo-300 hover:text-white hover:border-indigo-500 hover:bg-indigo-900/40 transition cursor-pointer">
            What documents do I need?
          </button>
          <button @click="input = 'Help me understand my standard vs itemized deduction options'; send()"
            class="px-4 py-2 text-xs rounded-lg border border-slate-700 bg-slate-800/30 text-slate-400 hover:text-white hover:border-slate-500 hover:bg-slate-800/60 transition cursor-pointer">
            Standard vs itemized deductions
          </button>
          <button @click="input = 'What tax credits might I qualify for?'; send()"
            class="px-4 py-2 text-xs rounded-lg border border-slate-700 bg-slate-800/30 text-slate-400 hover:text-white hover:border-slate-500 hover:bg-slate-800/60 transition cursor-pointer">
            Tax credits I qualify for
          </button>
          <button @click="input = 'I have a W-2 to upload and review'; send()"
            class="px-4 py-2 text-xs rounded-lg border border-slate-700 bg-slate-800/30 text-slate-400 hover:text-white hover:border-slate-500 hover:bg-slate-800/60 transition cursor-pointer">
            Upload a W-2
          </button>
        </div>
      </div>
    </template>

    <!-- Chat messages -->
    <template x-for="(msg, i) in messages" :key="i">
      <div :class="msg.role === 'user' ? 'flex justify-end' : 'flex justify-start'">
        <!-- Bot message -->
        <template x-if="msg.role === 'bot'">
          <div class="flex items-start gap-2 max-w-[95%]" x-show="msg.text || msg.status || (msg.statusLog && msg.statusLog.length > 0)">
            <div class="w-8 h-8 rounded-full bg-indigo-700 flex items-center justify-center text-sm flex-shrink-0 mt-1">
              <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
              </svg>
            </div>
            <div class="chat-bubble-bot chat-content px-4 py-3 text-sm text-slate-200 leading-relaxed">
              <!-- Status log while streaming -->
              <template x-if="msg.statusLog && msg.statusLog.length > 0">
                <div class="mb-2 max-w-md">
                  <div x-show="!msg.text" class="pl-2 border-l border-slate-700 space-y-0.5">
                    <template x-for="(entry, j) in msg.statusLog" :key="j">
                      <p class="text-xs text-slate-500 leading-snug" x-text="entry"></p>
                    </template>
                    <p x-show="msg.status" class="text-xs text-slate-400 leading-snug animate-pulse" x-text="msg.status"></p>
                  </div>
                  <div x-show="msg.text" x-data="{ expanded: false }">
                    <button @click="expanded = !expanded"
                      class="text-xs text-slate-500 hover:text-slate-300 transition flex items-center gap-1 cursor-pointer">
                      <span x-text="expanded ? '\u25BE' : '\u25B8'" class="text-[10px]"></span>
                      <span x-text="msg.statusLog.length + ' step' + (msg.statusLog.length === 1 ? '' : 's')"></span>
                    </button>
                    <div x-show="expanded" x-transition.duration.200ms class="mt-1 pl-2 border-l border-slate-700 space-y-0.5">
                      <template x-for="(entry, j) in msg.statusLog" :key="j">
                        <p class="text-xs text-slate-500 leading-snug" x-text="entry"></p>
                      </template>
                    </div>
                  </div>
                </div>
              </template>
              <p x-show="msg.status && (!msg.statusLog || msg.statusLog.length === 0)" x-text="msg.status" class="mb-2 max-w-md text-xs leading-relaxed text-slate-400"></p>
              <div x-show="msg.text" x-html="formatMessage(msg.text)"></div>
              <!-- Actions: copy, play, model label -->
              <div x-show="msg.text" class="mt-2 flex items-center gap-2">
                <button
                  @click="copyText(msg.text, $event)"
                  type="button"
                  class="rounded-full border border-slate-600 p-1.5 text-slate-300 transition hover:border-indigo-500 hover:text-white"
                  title="Copy">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                </button>
                <template x-if="speechSupported">
                  <button
                    @click="speakText(msg.text)"
                    type="button"
                    class="rounded-full border border-slate-600 p-1.5 text-slate-300 transition hover:border-indigo-500 hover:text-white"
                    title="Play audio">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                  </button>
                </template>
                <button
                  x-show="isSpeaking && currentSpeechText === msg.text"
                  @click="stopSpeech()"
                  type="button"
                  class="rounded-full border border-indigo-700 bg-indigo-600/20 p-1.5 text-indigo-200 transition hover:bg-indigo-600/30"
                  title="Stop audio">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
                </button>
                <span x-show="msg.model" class="ml-auto text-[10px] text-indigo-400/70 select-none" x-text="msg.model"></span>
              </div>
            </div>
          </div>
        </template>
        <!-- User message -->
        <template x-if="msg.role === 'user'">
          <div class="chat-bubble-user chat-content px-4 py-3 text-sm text-white max-w-[95%] group relative">
            <span x-text="msg.text"></span>
            <!-- Show attached file names -->
            <template x-if="msg.files && msg.files.length > 0">
              <div class="mt-2 flex flex-wrap gap-1">
                <template x-for="f in msg.files" :key="f">
                  <span class="inline-block bg-indigo-800/50 text-indigo-200 text-xs px-2 py-0.5 rounded-full" x-text="f"></span>
                </template>
              </div>
            </template>
            <button @click="copyText(msg.text, $event)"
              class="absolute top-1 right-1 opacity-0 group-hover:opacity-100 transition-opacity text-white/50 hover:text-white p-1 rounded"
              title="Copy">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
            </button>
          </div>
        </template>
      </div>
    </template>
  </div>

  <!-- Input area -->
  <div class="sticky bottom-0 z-10 flex-shrink-0 border-t border-slate-700 bg-slate-900/95 backdrop-blur composer-shell">
    <div class="p-3">
      <!-- Stop audio button -->
      <div x-show="isSpeaking" x-cloak class="mb-2 flex justify-center">
        <button @click="stopSpeech()" type="button"
          class="rounded-full border border-indigo-700 bg-indigo-600/20 px-4 py-2 text-sm text-indigo-100 transition hover:bg-indigo-600/30">
          Stop audio
        </button>
      </div>
      <!-- Hidden file input -->
      <input type="file" multiple accept=".pdf,.jpg,.jpeg,.png,.csv,.xlsx,.xls,.heic,.webp" x-ref="fileInput" class="hidden" @change="onFilePick($event)">
      <!-- Attached files preview -->
      <div x-show="attachedFiles.length > 0" x-cloak class="flex flex-wrap gap-2 mb-2">
        <template x-for="(file, idx) in attachedFiles" :key="file.name + '-' + idx">
          <div class="inline-flex items-center gap-2 bg-slate-800 border border-slate-700 rounded-full px-3 py-1 text-xs text-slate-300">
            <svg class="w-3 h-3 text-indigo-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/>
            </svg>
            <span class="truncate max-w-[14rem]" x-text="file.name"></span>
            <button @click="attachedFiles.splice(idx, 1)" class="text-slate-500 hover:text-white ml-1">
              <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
          </div>
        </template>
      </div>
      <div class="flex gap-2 items-end">
        <!-- Attach button -->
        <button @click="$refs.fileInput.click()"
          class="border border-slate-700 text-slate-300 hover:text-white hover:bg-slate-700 px-3 py-3 rounded-2xl text-sm font-medium transition flex-shrink-0"
          title="Attach W-2, receipts, tax documents">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/>
          </svg>
        </button>
        <!-- Text input -->
        <textarea x-model="input" @keydown.enter.prevent="if(!$event.shiftKey) send()"
          placeholder="Ask about your taxes, upload a W-2, or describe your situation..."
          rows="1"
          class="flex-1 text-white bg-slate-800 border border-slate-700 rounded-2xl px-4 py-3 text-sm resize-none focus:outline-none focus:border-indigo-500 max-h-32 transition-colors duration-200"
          style="overflow:hidden"
          @input="autoResize($el)" x-ref="inputBox"></textarea>
        <!-- Send button -->
        <button @click="send()" :disabled="!input.trim() && attachedFiles.length === 0"
          class="bg-indigo-600 hover:bg-indigo-500 disabled:opacity-40 text-white p-3 rounded-2xl transition flex-shrink-0">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
          </svg>
        </button>
      </div>
      <p class="text-slate-600 text-xs mt-2 text-center">Shift+Enter for new line &middot; Drag &amp; drop files anywhere</p>
    </div>
  </div>

  <script>
    function taxApp() {
      const sessionId = 'tax_accountant_' + Math.random().toString(36).slice(2);
      return {
        messages: [],
        input: '',
        typing: false,
        attachedFiles: [],
        pendingMessages: [],
        dragOver: false,
        speechSupported: 'speechSynthesis' in window,
        isSpeaking: false,
        currentSpeechText: '',
        currentAbortController: null,
        sessionId,
        _userNearBottom: true,

        init() {
          this._initScrollTracker();
        },

        _initScrollTracker() {
          const el = document.getElementById('chat-messages');
          if (!el) return;
          el.addEventListener('scroll', () => {
            const dist = el.scrollHeight - el.scrollTop - el.clientHeight;
            this._userNearBottom = dist < 150;
          }, { passive: true });
        },

        scrollBottom(force) {
          const el = document.getElementById('chat-messages');
          if (!el) return;
          if (force || this._userNearBottom) {
            el.scrollTop = el.scrollHeight;
          }
        },

        autoResize(el) {
          el.style.height = 'auto';
          const h = Math.min(el.scrollHeight, 128);
          el.style.height = h + 'px';
          el.style.overflow = el.scrollHeight > 128 ? 'auto' : 'hidden';
        },

        // --- File handling ---
        onFilePick(event) {
          const files = Array.from(event.target.files || []);
          event.target.value = '';
          for (const f of files) {
            this.attachedFiles.push(f);
          }
        },

        handleDrop(event) {
          this.dragOver = false;
          const files = Array.from(event.dataTransfer.files || []);
          for (const f of files) {
            this.attachedFiles.push(f);
          }
        },

        async uploadFiles(files) {
          if (!files.length) return null;
          const fd = new FormData();
          for (const file of files) fd.append('files', file);
          fd.append('descriptions_json', JSON.stringify(files.map(() => '')));
          try {
            const response = await fetch('/api/files/upload', { method: 'POST', body: fd });
            if (!response.ok) return null;
            const data = await response.json();
            const paths = [];
            for (const result of (data.results || [])) {
              const path = result.path || result.existing_path;
              if (path) paths.push({ name: result.saved_name || result.name || path.split('/').pop(), path });
            }
            return paths;
          } catch (e) {
            console.error('File upload failed:', e);
            return null;
          }
        },

        // --- Send message ---
        async send() {
          const msg = this.input.trim();
          const files = [...this.attachedFiles];
          if (!msg && !files.length) return;

          // Build user message
          const fileNames = files.map(f => f.name);
          let displayText = msg;
          if (!msg && files.length) {
            displayText = 'Uploaded: ' + fileNames.join(', ');
          }

          this.messages.push({ role: 'user', text: displayText, files: fileNames.length ? fileNames : null });
          this.input = '';
          this.attachedFiles = [];
          this.$nextTick(() => { this.autoResize(this.$refs.inputBox); this.scrollBottom(true); });

          // Upload files if any, then send chat
          let fileContext = null;
          if (files.length) {
            const uploaded = await this.uploadFiles(files);
            if (uploaded && uploaded.length) {
              const lines = uploaded.map(f => `- ${f.name} (${f.path})`);
              fileContext = 'Attached tax documents:\n' + lines.join('\n');
            }
          }

          this.pendingMessages.push({ message: msg || ('Please analyze these uploaded tax documents: ' + fileNames.join(', ')), file_context: fileContext });
          if (!this.typing) {
            this.processQueue();
          }
        },

        async processQueue() {
          if (this.typing || this.pendingMessages.length === 0) return;
          const next = this.pendingMessages.shift();
          const botIndex = this.messages.push({ role: 'bot', text: '', model: '', status: '', statusLog: [] }) - 1;
          this._currentBotIndex = botIndex;
          this.typing = true;
          this.$nextTick(() => this.scrollBottom(true));

          const MAX_RETRIES = 2;
          const BASE_DELAY_MS = 2000;

          for (let attempt = 0; attempt <= MAX_RETRIES; attempt++) {
            try {
              if (attempt > 0) {
                const delay = BASE_DELAY_MS * Math.pow(2, attempt - 1);
                this.messages[botIndex].status = `Reconnecting (attempt ${attempt + 1}/${MAX_RETRIES + 1})...`;
                this.messages[botIndex].text = '';
                await new Promise(resolve => setTimeout(resolve, delay));
              }
              this.currentAbortController = new AbortController();

              // Prepend tax accountant context to the message
              const taxPrefix = '[Tax Accountant Essence] ';
              const r = await fetch('/api/jane/chat/stream', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  message: taxPrefix + next.message,
                  session_id: this.sessionId,
                  file_context: next.file_context,
                  platform: 'web',
                  tts_enabled: false,
                  essence: 'tax_accountant'
                }),
                signal: this.currentAbortController.signal,
              });

              if (!r.ok) {
                const errText = await r.text().catch(() => '');
                if (r.status >= 500 && attempt < MAX_RETRIES) continue;
                throw new Error(errText || `Request failed (${r.status})`);
              }
              if (!r.body) throw new Error('Stream unavailable.');
              await this.consumeStream(r.body, botIndex);

              const finalIdx = this._currentBotIndex ?? botIndex;
              if (!this.messages[finalIdx].text.trim()) {
                this.messages[finalIdx].text = '_(no response)_';
              }
              break;
            } catch (error) {
              if (error.name === 'AbortError') break;
              const isRetryable = (error instanceof TypeError && error.message === 'Failed to fetch') || (error?.message || '').includes('status 5');
              if (isRetryable && attempt < MAX_RETRIES) continue;

              if (this.messages[botIndex]) {
                const partial = (this.messages[botIndex].text || '').trim();
                this.messages[botIndex].text = partial
                  ? `${partial}\n\n--- Connection lost before the response finished.`
                  : (error?.message || 'Could not reach the server.');
                this.messages[botIndex].status = '';
              }
              break;
            }
          }
          this.typing = false;
          if (this.pendingMessages.length > 0) {
            this.processQueue();
          }
        },

        async consumeStream(stream, botIndex) {
          const reader = stream.getReader();
          const decoder = new TextDecoder();
          let buffer = '';
          let sawTerminalEvent = false;

          while (true) {
            const { value, done } = await reader.read();
            buffer += decoder.decode(value || new Uint8Array(), { stream: !done });
            let newlineIndex;
            while ((newlineIndex = buffer.indexOf('\n')) >= 0) {
              const line = buffer.slice(0, newlineIndex).trim();
              buffer = buffer.slice(newlineIndex + 1);
              if (!line) continue;
              if (this.applyStreamEvent(line, botIndex)) {
                sawTerminalEvent = true;
              }
            }
            if (done) {
              const tail = buffer.trim();
              if (tail && this.applyStreamEvent(tail, botIndex)) {
                sawTerminalEvent = true;
              }
              break;
            }
          }
          if (!sawTerminalEvent) {
            throw new Error('Stream ended before completion.');
          }
        },

        applyStreamEvent(line, botIndex) {
          let event;
          try { event = JSON.parse(line); } catch { return false; }
          let msg = this.messages[botIndex];
          if (!msg) return false;

          const getActive = () => {
            const idx = this._currentBotIndex ?? botIndex;
            return this.messages[idx] || msg;
          };

          if (event.type === 'heartbeat') {
            return false;
          } else if (event.type === 'model') {
            getActive().model = event.data || '';
          } else if (event.type === 'ack') {
            this.$nextTick(() => this.scrollBottom());
          } else if (event.type === 'status') {
            if (event.data) {
              const target = getActive();
              if (!target.statusLog) target.statusLog = [];
              target.statusLog.push(event.data);
              target.status = 'Working...';
            }
            this.$nextTick(() => this.scrollBottom());
          } else if (event.type === 'delta' && event.data) {
            const active = getActive();
            active.text += event.data;
            active.text = active.text.replace(/<spoken>[\s\S]*?<\/spoken>/gi, '').replace(/<spoken>[\s\S]*$/i, '');
            active.status = '';
            this.$nextTick(() => this.scrollBottom());
          } else if (event.type === 'done') {
            const active = getActive();
            const doneText = event.data || '';
            const deltaText = active.text || '';
            const rawText = doneText.length >= deltaText.length ? (doneText || '_(no response)_') : deltaText;
            active.text = rawText.replace(/<spoken>[\s\S]*?<\/spoken>/gi, '').trimEnd();
            if (!active.text) active.text = '_(no response)_';
            active.status = '';
            this.$nextTick(() => this.scrollBottom());
          } else if (event.type === 'error') {
            getActive().text = event.data || 'An error occurred.';
            getActive().status = '';
            return true;
          }
          return event.type === 'done';
        },

        // --- Markdown rendering ---
        formatMessage(text) {
          if (!text) return '';
          let s = text;
          if (typeof marked !== 'undefined') {
            const renderer = new marked.Renderer();
            const defaultCode = renderer.code.bind(renderer);
            renderer.code = function({ text, lang, escaped }) {
              const raw = defaultCode({ text, lang, escaped });
              const label = lang ? `Code (${lang})` : 'Output';
              return `<details class="code-collapse"><summary>${label}</summary>${raw}</details>`;
            };
            s = marked.parse(s, { breaks: true, gfm: true, renderer });
          } else {
            s = s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
          }
          return s;
        },

        // --- Session ---
        clearSession() {
          this.cancelResponse();
          this.messages = [];
          this.pendingMessages = [];
          this.attachedFiles = [];
          this.typing = false;
          this.sessionId = 'tax_accountant_' + Math.random().toString(36).slice(2);
        },

        cancelResponse() {
          if (this.currentAbortController) {
            this.currentAbortController.abort();
            this.currentAbortController = null;
          }
          this.pendingMessages = [];
          const last = this.messages[this.messages.length - 1];
          if (last && last.role === 'bot' && this.typing) {
            last.text = last.text ? last.text + '\n\n*(cancelled)*' : '*(cancelled)*';
            last.status = '';
          }
          this.typing = false;
        },

        // --- Copy / Speech ---
        copyText(text, event) {
          const cleaned = (text || '').trim();
          if (!cleaned) return;
          navigator.clipboard.writeText(cleaned).then(() => {
            const btn = event?.target?.closest('button');
            if (btn) {
              const orig = btn.innerHTML;
              btn.textContent = 'Copied!';
              setTimeout(() => { btn.innerHTML = orig; }, 1500);
            }
          }).catch(() => {});
        },

        speakText(text) {
          if (!this.speechSupported) return;
          const cleaned = (text || '')
            .replace(/[_*`#>\-\[\]\(\)]/g, ' ')
            .replace(/\s+/g, ' ')
            .trim();
          if (!cleaned) return;
          this.stopSpeech();
          const utterance = new SpeechSynthesisUtterance(cleaned);
          utterance.onstart = () => { this.isSpeaking = true; this.currentSpeechText = text || ''; };
          utterance.onend = () => this.resetSpeechState();
          utterance.onerror = () => this.resetSpeechState();
          this.currentSpeechText = text || '';
          this.isSpeaking = true;
          window.speechSynthesis.speak(utterance);
        },

        stopSpeech() {
          if (!this.speechSupported) return;
          window.speechSynthesis.cancel();
          this.resetSpeechState();
        },

        resetSpeechState() {
          this.isSpeaking = false;
          this.currentSpeechText = '';
        },
      };
    }

    function essenceDropdown() {
      return {
        open: false,
        items: [],
        toggle() {
          if (!this.open) this.fetchItems();
          this.open = !this.open;
        },
        async fetchItems() {
          try {
            const r = await fetch('/api/essences', { cache: 'no-store' });
            if (r.ok) {
              const all = await r.json();
              this.items = all.filter(i => i.type === 'essence').sort((a, b) => a.name.localeCompare(b.name));
            }
          } catch (e) { console.error('Failed to fetch essences', e); }
        },
      }
    }
    function toolsDropdown() {
      return {
        open: false,
        items: [],
        toggle() {
          if (!this.open) this.fetchItems();
          this.open = !this.open;
        },
        async fetchItems() {
          try {
            const r = await fetch('/api/essences', { cache: 'no-store' });
            if (r.ok) {
              const all = await r.json();
              this.items = all.filter(i => (i.type || 'tool') === 'tool').sort((a, b) => a.name.localeCompare(b.name));
            }
          } catch (e) { console.error('Failed to fetch tools', e); }
        },
      }
    }
  </script>
</body>
</html>
