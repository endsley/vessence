# ─────────────────────────────────────────────────────────────────────────────
# Vessence — docker-compose.yml
# ─────────────────────────────────────────────────────────────────────────────
# Quick start:
#   1. bash install.sh          ← picks your AI brain, streams install progress,
#                                  then opens onboarding at http://localhost:3000
#
# (Advanced) Manual start:
#   1. Copy .env.example to .env and set JANE_BRAIN=gemini|claude|openai
#   2. docker compose up -d chromadb jane   (wait for Jane to be healthy)
#   3. docker compose up -d onboarding
#   4. Open http://localhost:3000
#
# After setup, access:
#   Jane (chat + vault):  http://jane.localhost
#   Setup / Settings:     http://localhost:3000
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Traefik — reverse proxy ──────────────────────────────────────────────
  traefik:
    image: traefik:v3.3
    container_name: vessence-traefik
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/traefik.yml:ro
    networks:
      - vessence

  # ── ChromaDB — vector memory (pulled from Docker Hub, not built locally) ──
  chromadb:
    image: chromadb/chroma:1.0.10
    container_name: vessence-chromadb
    restart: unless-stopped
    environment:
      - CHROMA_SERVER_AUTH_CREDENTIALS_PROVIDER=
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
    volumes:
      - ${VESSENCE_DATA_HOME:-./runtime}/vector_db:/chroma/chroma
    networks:
      - vessence
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Amber — REMOVED: essences now run through Jane's standing brain ─────

  # ── Vault — REMOVED: Jane now serves vault routes directly ──────────────
  # The vault service has been consolidated into the jane service.
  # vault.vessences.com and vault.localhost now route to jane.
  # To restore the standalone vault, uncomment the block below:
  #
  # vault:
  #   image: vessence/vault:latest
  #   build:
  #     context: .
  #     dockerfile: docker/vault/Dockerfile
  #   container_name: vessence-vault
  #   restart: unless-stopped
  #   depends_on:
  #     amber:
  #       condition: service_healthy
  #   env_file: ${VESSENCE_DATA_HOME:-./runtime}/.env
  #   environment:
  #     - VESSENCE_HOME=/app
  #     - VESSENCE_DATA_HOME=/data
  #     - VAULT_HOME=/vault
  #     - CHROMA_HOST=chromadb
  #     - CHROMA_PORT=8000
  #     - ADK_SERVER_URL=http://amber:8000
  #     - VAULT_WEB_DB_PATH=/data/vault_web/vault_web.db
  #   volumes:
  #     - ${VAULT_HOME:-./vault}:/vault
  #     - ${VESSENCE_DATA_HOME:-./runtime}:/data
  #   networks:
  #     - vessence
  #   labels:
  #     - "traefik.enable=true"
  #     - "traefik.http.routers.vault.rule=Host(`vault.localhost`) || HostRegexp(`vault\\..+`)"
  #     - "traefik.http.routers.vault.entrypoints=web"
  #     - "traefik.http.services.vault.loadbalancer.server.port=8080"
  #   healthcheck:
  #     test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 30s

  # ── Marketing site — public landing page + package download ─────────────
  marketing:
    image: nginx:1.27-alpine
    container_name: vessence-marketing
    restart: unless-stopped
    volumes:
      - ./marketing_site:/usr/share/nginx/html:ro
      - ./marketing_site/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - vessence
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.marketing.rule=Host(`vessences.com`) || Host(`www.vessences.com`)"
      - "traefik.http.routers.marketing.entrypoints=web"
      - "traefik.http.services.marketing.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Jane — chat UI + vault (serves both jane.* and vault.* routes) ──────
  jane:
    build:
      context: .
      dockerfile: docker/jane/Dockerfile
    container_name: vessence-jane
    restart: unless-stopped
    depends_on:
      chromadb:
        condition: service_healthy
    env_file:
      - path: ${VESSENCE_DATA_HOME:-./runtime}/.env
        required: false
    environment:
      - VESSENCE_HOME=/app
      - VESSENCE_DATA_HOME=/data
      - VAULT_HOME=/vault
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - TOOLS_DIR=/tools
      - ESSENCES_DIR=/essences
      - VAULT_WEB_DB_PATH=/data/vault_web/vault_web.db
    volumes:
      - ${VAULT_HOME:-./vault}:/vault
      - ${VESSENCE_DATA_HOME:-./runtime}:/data
      - ${TOOLS_DIR:-./tools}:/tools
      - ${ESSENCES_DIR:-./essences}:/essences
    ports:
      - "8081:8090"
    networks:
      - vessence
    labels:
      - "traefik.enable=true"
      # Jane routes (primary)
      - "traefik.http.routers.jane.rule=Host(`jane.localhost`) || HostRegexp(`jane\\..+`)"
      - "traefik.http.routers.jane.entrypoints=web"
      - "traefik.http.services.jane.loadbalancer.server.port=8090"
      # Vault routes (now served by jane)
      - "traefik.http.routers.vault.rule=Host(`vault.localhost`) || HostRegexp(`vault\\..+`)"
      - "traefik.http.routers.vault.entrypoints=web"
      - "traefik.http.routers.vault.service=jane"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s   # Node.js + CLI install on first boot takes ~3 min

  # ── Onboarding — setup wizard (port 3000) ───────────────────────────────
  onboarding:
    build:
      context: .
      dockerfile: docker/onboarding/Dockerfile
    container_name: vessence-onboarding
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - path: ${VESSENCE_DATA_HOME:-./runtime}/.env
        required: false     # runtime .env may not exist on very first run
    environment:
      - VESSENCE_HOME=/app/host
      - VESSENCE_DATA_HOME=/data
      - VAULT_HOME=/vault
      - CHROMA_HOST=chromadb
      - VAULT_URL=http://jane:8090
      - JANE_URL=http://jane:8090
    volumes:
      - .:/app/host         # write .env back to host compose directory
      - ${VAULT_HOME:-./vault}:/vault
      - ${VESSENCE_DATA_HOME:-./runtime}:/data
    networks:
      - vessence
    depends_on:
      chromadb:
        condition: service_healthy
      jane:
        condition: service_healthy

  # ── Cloudflare Tunnel (optional) ────────────────────────────────────────
  # Named tunnel: requires CLOUDFLARE_TUNNEL_TOKEN in .env
  # Quick tunnel: set CLOUDFLARE_TUNNEL_TOKEN= (empty) for a free random URL
  cloudflared:
    image: cloudflare/cloudflared:2025.4.0
    container_name: vessence-cloudflared
    restart: unless-stopped
    depends_on:
      - jane
    env_file:
      - path: ${VESSENCE_DATA_HOME:-./runtime}/.env
        required: false
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:-}
    networks:
      - vessence
    # Named tunnel if token is set; quick tunnel if not
    command: >
      sh -c '
        if [ -n "$$TUNNEL_TOKEN" ]; then
          cloudflared tunnel --no-autoupdate run --token $$TUNNEL_TOKEN
        else
          echo "No CLOUDFLARE_TUNNEL_TOKEN set — starting quick tunnel for vault on port 80"
          cloudflared tunnel --no-autoupdate --url http://traefik:80
        fi
      '
    profiles:
      - cloudflare    # opt-in: docker compose --profile cloudflare up

networks:
  vessence:
    driver: bridge
    name: vessence
